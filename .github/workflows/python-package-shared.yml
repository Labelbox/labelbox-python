name: Labelbox Python SDK Shared

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
      api-key:
        required: true
        type: string
      da-test-key:
        required: true
        type: string
      test-env:
        required: true
        type: string
      fixture-profile: 
        required: true
        type: boolean
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Cancel previous workflow
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_ACCESS_TOKEN  }}
          ref: ${{ github.head_ref }}
      - name: Install the latest version of rye
        uses: eifinger/setup-rye@v2
        with:
          version: '0.29.0'
          enable-cache: true
      - name: Rye Setup
        run: |
          rye config --set-bool behavior.use-uv=true
      - name: Python setup
        run: rye pin ${{ inputs.python-version }}
      - name: Environment setup
        working-directory: libs/labelbox
        run: | 
          rye sync -f --update-all
      - name: Linting
        working-directory: libs/labelbox
        run: rye run lint
      - name: Integration Testing
        env:
          PYTEST_XDIST_AUTO_NUM_WORKERS: 32
          LABELBOX_TEST_API_KEY: ${{ secrets[inputs.api-key] }}
          DA_GCP_LABELBOX_API_KEY: ${{ secrets[inputs.da-test-key] }}
          LABELBOX_TEST_ENV: ${{ inputs.test-env }}
        working-directory: libs/labelbox
        run: rye run integration
      - name: Unit && Data Testing
        env:
          PYTEST_XDIST_AUTO_NUM_WORKERS: 32
          LABELBOX_TEST_API_KEY: ${{ secrets[inputs.api-key] }}
          DA_GCP_LABELBOX_API_KEY: ${{ secrets[inputs.da-test-key] }}
          LABELBOX_TEST_ENV: ${{ inputs.test-env }}
        working-directory: libs/labelbox
        run: |
          rye sync -f --features labelbox/data
          rye run unit
          rye run data    
  test-pypi:
    runs-on: ubuntu-latest
    needs: ['build']
    environment: 
      name: Test-PyPI
      url: 'https://test.pypi.org/p/labelbox-test'
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_ACCESS_TOKEN  }}
          ref: ${{ github.head_ref }}
      - name: Install the latest version of rye
        uses: eifinger/setup-rye@v2
        with:
          version: '0.29.0'
          enable-cache: true
      - name: Rye Setup
        run: |
          rye config --set-bool behavior.use-uv=true
      - name: Create build
        id: create-build
        working-directory: libs/labelbox
        run: |
          VERSION=$(date +"%Y.%m.%d.%H.%M")
          echo "pip install --index-url https://test.pypi.org/simple/ labelbox-test@$VERSION" >> "$GITHUB_STEP_SUMMARY"
          rye sync
          rye version "$VERSION"
          rye run toml set --toml-path pyproject.toml project.name labelbox-test
          rye build
      - name: Publish package distributions to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          repository-url: https://test.pypi.org/legacy/
